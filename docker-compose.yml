services:
  backend:
    build: ./server
    ports:
      - "8000:8000"
    env_file: ./.env
    volumes:
      - ./server/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - atome-network

  frontend:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - atome-network

networks:
  atome-network:
    driver: bridge
